name: Update Bakery caches

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: bakery-live-caches
  cancel-in-progress: false

jobs:
  update-caches:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update gas cost cache
        env:
          COST_CACHE_MAX_BLOCKS: 30000
          COST_CACHE_MAX_TXS: 300000
          COST_CACHE_LOG_BLOCK_SPAN: 1000
          COST_CACHE_BLOCK_RECEIPT_BATCH_SIZE: 12
          COST_CACHE_RECEIPT_BATCH_SIZE: 50
          COST_CACHE_CHECKPOINT_CHUNKS: 1
          COST_CACHE_THROTTLE_MS: 25
          SEASON_SNAPSHOT_WINDOW_MINUTES: 90
        run: npm run update:cost-cache

      - name: Update rug cache
        env:
          RUG_CACHE_PAGE_LIMIT: 100
          RUG_CACHE_HEAD_PAGE_BUDGET: 8
          RUG_CACHE_HISTORY_PAGE_BUDGET: 200
          RUG_CACHE_THROTTLE_MS: 25
        run: npm run update:rug-cache

      - name: Commit caches
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/cost-cache.json data/rank-cache.json
          if [ -f data/rug-cache.json ]; then
            git add data/rug-cache.json
          fi
          if [ -d data/season-history ]; then
            git add data/season-history
          fi
          if git diff --cached --quiet; then
            echo "No cache changes to commit."
            exit 0
          fi
          git commit -m "Update Bakery live caches"
          git push
